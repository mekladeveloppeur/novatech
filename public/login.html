<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTech Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
font-family:'Inter',sans-serif;
position:relative;
}

/* animated grid */

body::before{
content:'';
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

background-size:60px 60px;

animation:gridMove 20s linear infinite;
}

@keyframes gridMove{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-60px,-60px);
}

}

/* glow */

.glow{
position:absolute;
width:500px;
height:500px;
background:#2563eb;
filter:blur(150px);
opacity:.25;
border-radius:50%;
animation:pulse 5s ease infinite;
}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

}

/* login box */

.login-box{

position:relative;
z-index:2;

width:420px;

padding:50px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 40px rgba(37,99,235,.2);

animation:fadeUp 1s ease;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
display:flex;
align-items:center;
gap:15px;
margin-bottom:40px;
}

.logo img{
width:50px;
}

.logo h1{
font-family:'Orbitron',sans-serif;
font-size:30px;
color:white;
}

.logo span{
color:#3b82f6;
}

.subtitle{
color:#94a3b8;
margin-top:5px;
font-size:14px;
}

/* inputs */

.input-group{
margin-bottom:25px;
}

.input-group label{
display:block;
margin-bottom:10px;
color:#cbd5e1;
font-size:14px;
}

.input-group input{

width:100%;
padding:16px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

color:white;

font-size:15px;

transition:.3s;
}

.input-group input:focus{

border-color:#3b82f6;

box-shadow:
0 0 20px rgba(59,130,246,.4);

}

/* button */

button{

width:100%;

padding:16px;

border:none;

border-radius:14px;

background:linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 10px 30px rgba(37,99,235,.5);

}

/* footer */

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#64748b;
}

/* responsive */

@media(max-width:500px){

.login-box{
width:92%;
padding:35px;
}

.logo h1{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="glow"></div>

<div class="login-box">

<div class="logo">

<img src="https://cdn-icons-png.flaticon.com/512/906/906334.png">

<div>

<h1>Nova<span>Tech</span></h1>

<div class="subtitle">
Admin Dashboard Secure Access
</div>

</div>

</div>

<form id="loginForm">

<div class="input-group">

<label>Username</label>

<input
type="text"
id="username"
placeholder="Enter username"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter password"
required>

</div>

<button type="submit">
Secure Login
</button>

</form>

<div class="footer">
NovaTech Engineering © 2026
</div>

</div>

<script>

document
.getElementById('loginForm')
.addEventListener('submit', async (e) => {

e.preventDefault();

const res = await fetch('/api/login', {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

username:
document.getElementById('username').value,

password:
document.getElementById('password').value

})

});

if(res.ok){

window.location.href='/admin.html';

}else{

alert('Invalid credentials');

}

});

</script>

</body>
</html>
